  function renderUI() {
    const rowsEl = document.getElementById('factorRows');
    const togglesEl = document.getElementById('factorToggles');
    if (!rowsEl || !togglesEl) return;

    // ── Solo display checkboxes ──
    let soloHTML = '<span style=\"font-size:11px;color:var(--text-dim);margin-right:4px;\">单独:</span>';
    SOLO_OPTIONS.forEach(opt => {
      const checked = soloSelection[opt.id] ? ' checked' : '';
      soloHTML += '<label style=\"font-size:10px;color:var(--text-dim);cursor:pointer;margin-right:4px;white-space:nowrap;\">'
        + '<input type=\"checkbox\" class=\"cbSolo\" data-id=\"' + opt.id + '\"' + checked
        + ' style=\"accent-color:' + opt.color + ';width:11px;height:11px;margin:0 2px 0 0;vertical-align:middle;\">'
        + opt.label + '</label>';
    });
    togglesEl.innerHTML = soloHTML;
    togglesEl.querySelectorAll('.cbSolo').forEach(cb => {
      cb.addEventListener('change', function() {
        soloSelection[this.dataset.id] = this.checked; forceSpecUpdate(); redrawAll();
      });
    });

    // ── Stacked display ──
    let stackHTML = '<div style=\"margin-top:4px;\">';
    stackHTML += '<label style=\"font-size:11px;color:var(--text-dim);cursor:pointer;\">'
      + '<input type=\"checkbox\" id=\"cbShowStacked\"' + (showStacked ? ' checked' : '')
      + ' style=\"accent-color:#e0a830;width:12px;height:12px;margin:0 2px 0 0;vertical-align:middle;\">叠加:</label> ';
    SOLO_OPTIONS.forEach(opt => {
      stackHTML += '<label style=\"font-size:10px;color:var(--text-dim);cursor:pointer;margin-right:4px;white-space:nowrap;\">'
        + '<input type=\"checkbox\" class=\"cbStack\" data-id=\"' + opt.id + '\"'
        + (stackComponents[opt.id] ? ' checked' : '')
        + ' style=\"accent-color:' + opt.color + ';width:11px;height:11px;margin:0 2px 0 0;vertical-align:middle;\">'
        + opt.label + '</label>';
    });
    stackHTML += '</div>';
    rowsEl.innerHTML = stackHTML;

    document.getElementById('cbShowStacked').addEventListener('change', function() {
      showStacked = this.checked; forceSpecUpdate(); redrawAll();
    });
    rowsEl.querySelectorAll('.cbStack').forEach(cb => {
      cb.addEventListener('change', function() {
        stackComponents[this.dataset.id] = this.checked; forceSpecUpdate(); redrawAll();
      });
    });

    // ── Factor config buttons ──
    let cfgHTML = '<div style=\"margin-top:4px;display:flex;flex-wrap:wrap;gap:3px;\">';
    FACTOR_DEFS.forEach(def => {
      const cfg = factorConfigured[def.id];
      cfgHTML += '<button class=\"btn-config\" style=\"font-size:10px;padding:2px 6px;'
        + (cfg ? 'border-color:#2d5a2d;color:var(--green);' : '')
        + '\" data-cfg=\"' + def.id + '\">' + def.icon + def.name + (cfg ? '✓' : ' ⚙') + '</button>';
    });
    cfgHTML += '</div>';
    rowsEl.insertAdjacentHTML('beforeend', cfgHTML);
    rowsEl.querySelectorAll('[data-cfg]').forEach(btn => {
      btn.addEventListener('click', function() {
        const def = FACTOR_DEFS.find(d => d.id === this.dataset.cfg);
        if (def) window.location.href = def.configPage;
      });
    });
  }

  // ═══════════════════════════════════════════
  // Init
  // ═══════════════════════════════════════════
  
  // ═══════════════════════════════════════════
  // State persistence
  // ═══════════════════════════════════════════
  const STATE_KEY = 'piezo_signal_state';
  function saveState() {
    try {
      const st = {
        components, oscTimeMode, oscSpan, oscFXMin, oscFXMax,
        fftLines, winType, fftCompMax, fftXMin, fftXMax,
        oscYAuto, oscYMin, oscYMax, specYAuto, specYMin, specYMax
      };
      localStorage.setItem(STATE_KEY, JSON.stringify(st, (k, v) => {
        if (v === Infinity) return 'Infinity';
        if (v === -Infinity) return '-Infinity';
        return v;
      }));
    } catch(e) {}
  }
  function restoreState() {
    try {
      const raw = localStorage.getItem(STATE_KEY);
      if (!raw) return;
      const st = JSON.parse(raw, (k, v) => {
        if (v === 'Infinity') return Infinity;
        if (v === '-Infinity') return -Infinity;
        return v;
      });
      if (st.components) {
        components = st.components.map(c => ({
          ...c,
          tEnd: (c.tEnd === null || c.tEnd === undefined) ? Infinity : c.tEnd
        }));
      }
      if (st.oscTimeMode) oscTimeMode = st.oscTimeMode;
      if (st.oscSpan !== undefined) oscSpan = st.oscSpan;
      if (st.oscFXMin !== undefined) oscFXMin = st.oscFXMin;
      if (st.oscFXMax !== undefined) oscFXMax = st.oscFXMax;
      if (st.fftLines) { fftLines = st.fftLines; rebuildFFT(); }
      if (st.winType) winType = st.winType;
      if (st.fftCompMax !== undefined) fftCompMax = st.fftCompMax;
      if (st.fftXMin !== undefined) fftXMin = st.fftXMin;
      if (st.fftXMax !== undefined) fftXMax = st.fftXMax;
      if (st.oscYAuto !== undefined) oscYAuto = st.oscYAuto;
      if (st.oscYMin !== undefined) oscYMin = st.oscYMin;
      if (st.oscYMax !== undefined) oscYMax = st.oscYMax;
      if (st.specYAuto !== undefined) specYAuto = st.specYAuto;
      if (st.specYMin !== undefined) specYMin = st.specYMin;
      if (st.specYMax !== undefined) specYMax = st.specYMax;
    } catch(e) {}
  }
  window.addEventListener('beforeunload', saveState);

  restoreState();
  loadAllFactorConfigs();
  renderUI();
  rebuildFFT();
  renderCL();
  genSamples(0, fftN / SR + 0.05);
  const sp = computeSpectrum();
  if (sp.fs.length > 0) { specFreqs = sp.fs; specMags = sp.ms; }

  requestAnimationFrame(() => {
    redrawAll(); // initial draw after page renders
    forceSpecUpdate(); // compute spectra immediately (important when paused)
    requestAnimationFrame(() => { lastT = performance.now(); fpsT = lastT; raf = requestAnimationFrame(anim); });
  });

})();
</script>
</body>
</html>

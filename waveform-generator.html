<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波形生成器 v5 — 压电测力信号模拟</title>
<style>
:root {
 --bg: #0d1117; --panel: #161b22; --border: #30363d;
 --text: #c9d1d9; --text-dim: #8b949e; --accent: #f0c040;
 --accent2: #58a6ff; --danger: #f85149; --warn: #d29922;
 --green: #3fb950; --input-bg: #1c2129; --input-border: #30363d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
 background: var(--bg); color: var(--text);
 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
   "Microsoft YaHei", "Helvetica Neue", sans-serif;
 font-size: 12px; line-height: 1.4; height: 100vh; overflow: hidden;
 user-select: none;
}
.header {
 background: var(--panel); border-bottom: 1px solid var(--border);
 padding: 6px 14px; display: flex; align-items: center; gap: 10px;
 height: 36px; flex-shrink: 0;
}
.header .logo { font-size: 1em; font-weight: 700; }
.main { display: flex; height: calc(100vh - 36px); }

.panel-left {
 width: 350px; min-width: 350px; background: var(--panel);
 border-right: 1px solid var(--border); padding: 8px;
 display: flex; flex-direction: column; gap: 5px;
 overflow-y: auto; flex-shrink: 0;
}
.sec-title {
 font-size: 0.7em; font-weight: 700; color: var(--accent);
 text-transform: uppercase; padding: 2px 0 3px 6px; border-left: 3px solid var(--accent);
 display: flex; justify-content: space-between; align-items: center;
}
.comp-list { display: flex; flex-direction: column; gap: 3px; }
.comp-row {
 display: flex; align-items: center; gap: 2px;
 background: var(--bg); border: 1px solid var(--border);
 border-radius: 3px; padding: 3px 5px; flex-wrap: wrap;
}
.comp-row select, .comp-row input {
 background: var(--input-bg); color: var(--text);
 border: 1px solid var(--input-border); border-radius: 2px;
 padding: 1px 3px; font-size: 10px; font-family: inherit;
}
.comp-row select { width: 46px; }
.comp-row input[type="number"] { width: 40px; text-align: right; }
.comp-row .lbl { font-size: 8px; color: var(--text-dim); min-width: 8px; text-align: center; }
.comp-row .dc-badge { font-size: 8px; padding: 1px 3px; border-radius: 2px; background: #f0c04022; color: var(--accent); display: none; }
.comp-row .dc-badge.show { display: inline; }
.comp-row .btn-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 13px; padding: 0 2px; }
.row-hint { font-size: 9px; color: var(--text-dim); }
.btn-add {
 background: var(--input-bg); color: var(--accent2);
 border: 1px dashed var(--input-border); border-radius: 3px;
 padding: 4px; cursor: pointer; font-size: 10px; text-align: center;
}
.btn-add:hover { background: #1e2a3a; }

.set-row {
 display: flex; align-items: center; gap: 4px; font-size: 10px;
 padding: 2px 0;
}
.set-row label { color: var(--text-dim); min-width: 44px; font-size: 10px; }
.set-row select, .set-row input {
 background: var(--input-bg); color: var(--text);
 border: 1px solid var(--input-border); border-radius: 2px;
 padding: 1px 3px; font-size: 10px; font-family: inherit;
}
.set-row input[type="number"] { width: 50px; }
.set-row input[type="checkbox"] { margin: 0; }

.time-mode-row { display: flex; gap: 2px; font-size: 10px; }
.time-mode-row button {
 background: var(--input-bg); color: var(--text);
 border: 1px solid var(--input-border); border-radius: 2px;
 padding: 2px 6px; cursor: pointer; font-size: 10px; font-family: inherit;
 flex: 1;
}
.time-mode-row button.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }

.preset-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 2px; }
.preset-grid button {
 background: var(--input-bg); color: var(--text);
 border: 1px solid var(--input-border); border-radius: 2px;
 padding: 2px 4px; cursor: pointer; font-size: 9px; font-family: inherit;
 text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.preset-grid button:hover { border-color: var(--accent); color: var(--accent); }

.run-bar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.btn { padding: 3px 10px; border-radius: 3px; border: none; cursor: pointer; font-size: 11px; font-weight: 600; font-family: inherit; }
.btn.on { background: var(--green); color: #000; }
.btn.off { background: var(--warn); color: #000; }
.btn.dim { background: var(--input-bg); color: var(--text-dim); border: 1px solid var(--input-border); }
.fps { font-size: 9px; color: var(--text-dim); margin-left: auto; }

/* Right panel */
.panel-right { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.cp { display: flex; flex-direction: column; min-height: 0; position: relative; }
.cp.osc { flex: 1.3; border-bottom: 1px solid var(--border); }
.cp.spec { flex: 1; border-bottom: 1px solid var(--border); }
.cp.tml { flex: 0.25; min-height: 32px; }

.chdr {
 padding: 2px 8px; font-size: 0.65em; color: var(--text-dim);
 font-weight: 600; text-transform: uppercase;
 flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;
 gap: 6px;
}
.chdr .btn-cursor {
 background: var(--input-bg); color: var(--accent);
 border: 1px solid var(--input-border); border-radius: 2px;
 padding: 1px 6px; cursor: pointer; font-size: 9px; font-family: inherit;
 white-space: nowrap;
}
.chdr .btn-cursor:hover { border-color: var(--accent); }
.osc-tools { display: flex; gap: 1px; margin-left: 2px; margin-right: 4px; }
.osc-tools .btn-tool {
 background: var(--input-bg); color: var(--text-dim);
 border: 1px solid var(--input-border); border-radius: 2px;
 padding: 0px 5px; cursor: pointer; font-size: 13px; line-height: 18px;
 font-family: inherit; transition: all 0.15s;
}
.osc-tools .btn-tool:hover { border-color: var(--accent); color: var(--text); }
.osc-tools .btn-tool.active { background: #1e3a5f; color: var(--accent2); border-color: var(--accent2); }
.chdr .cursor-display {
 font-size: 9px; color: var(--accent); font-family: "SF Mono", monospace;
 display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
}
.chdr .cursor-display .cr-line {
 white-space: nowrap; padding: 1px 4px; border-radius: 2px;
 cursor: pointer; border: 1px solid transparent;
}
.chdr .cursor-display .cr-line.active {
 border-color: var(--danger); color: var(--danger);
}
.chdr .cursor-display .cr-line:hover { border-color: var(--accent2); }

.cwrap { flex: 1; min-height: 0; position: relative; }
.cwrap canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

.panel-left::-webkit-scrollbar { width: 3px; }
.panel-left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Axis edit popup */
.axis-edit {
 position: absolute; z-index: 20; display: none;
 background: #1a1e26; border: 1px solid var(--accent);
 border-radius: 3px; padding: 3px 5px;
}
.axis-edit input {
 background: var(--input-bg); color: var(--text);
 border: 1px solid var(--input-border); border-radius: 2px;
 padding: 2px 4px; font-size: 10px; font-family: inherit; width: 60px;
}
.axis-edit button {
 background: var(--accent2); color: #fff; border: none;
 border-radius: 2px; padding: 2px 6px; font-size: 9px; cursor: pointer;
}

/* ── Factor rows (interference panel) ── */
.factor-rows { display: flex; flex-direction: column; gap: 2px; }
.factor-row {
 display: flex; align-items: center; gap: 3px;
 background: var(--bg); border: 1px solid var(--input-border);
 border-radius: 2px; padding: 3px 5px; font-size: 9px;
}
.factor-row.configured { border-color: #2d5a2d; }
.factor-row .f-icon { font-size: 11px; flex-shrink: 0; }
.factor-row .f-name { width: 30px; flex-shrink: 0; font-weight: 600; color: var(--text); font-size: 9px; }
.factor-row .f-status { font-size: 8px; color: var(--danger); width: 36px; flex-shrink: 0; text-align: center; }
.factor-row.configured .f-status { color: var(--green); }
.factor-row .btn-config {
 background: var(--input-bg); color: var(--text-dim);
 border: 1px solid var(--input-border); border-radius: 2px;
 padding: 1px 5px; cursor: pointer; font-size: 8px; font-family: inherit;
 white-space: nowrap;
}
.factor-row .btn-config:hover { color: var(--accent); border-color: var(--accent); }
.factor-row .cb-label {
 font-size: 7px; color: var(--text-dim); cursor: pointer;
 user-select: none; display: flex; align-items: center; gap: 1px; white-space: nowrap;
}
.factor-row .cb-label.disabled { opacity: 0.35; cursor: not-allowed; }
.factor-row input[type="checkbox"] { accent-color: var(--accent2); width: 10px; height: 10px; cursor: pointer; margin: 0; }
.factor-row input[type="checkbox"]:disabled { cursor: not-allowed; }

/* ── Global factor toggles ── */
.factor-toggles {
 display: flex; gap: 6px; padding: 2px 0 4px 0;
}
.factor-toggles .toggle-label {
 font-size: 9px; color: var(--text-dim); cursor: pointer;
 user-select: none; display: flex; align-items: center; gap: 3px;
 padding: 2px 6px; border-radius: 2px; background: var(--input-bg);
 border: 1px solid var(--input-border); transition: all 0.15s;
}
.factor-toggles .toggle-label:hover { border-color: var(--accent); }
.factor-toggles .toggle-label input[type="checkbox"] {
 accent-color: var(--accent2); width: 11px; height: 11px; cursor: pointer; margin: 0;
}
</style>
</head>
<body>

<div class="header">
 <span class="logo">〰 波形生成器 v5</span>
 <span id="exprDisplay" style="flex:1;text-align:right;font-family:monospace;font-size:0.75em;color:var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">F(t) = 1·sin(2π·30t)</span>
</div>

<div class="main">
 <div class="panel-left">
   <div class="sec-title">信号分量 <span class="row-hint">(f=0=DC偏置, tStart/tEnd=时间范围)</span></div>
   <div class="comp-list" id="compList"></div>
   <button class="btn-add" id="btnAdd">+ 添加分量</button>

   <div class="sec-title">时域 X 轴模式</div>
   <div class="time-mode-row" id="timeModeRow">
     <button data-mode="sliding" class="active">滑动窗口</button>
     <button data-mode="fixed">固定窗口</button>
     <button data-mode="rolling">自动累计</button>
   </div>
   <div class="set-row" id="slidingSpanRow">
     <label>窗口跨度</label>
     <input type="number" id="oscSpan" value="5" min="0.01" max="100" step="0.1"> s
   </div>
   <div class="set-row" id="fixedRangeRow" style="display:none">
     <label>时间范围</label>
     <input type="number" id="oscXMin" value="0" min="0" step="0.01"> s ~
     <input type="number" id="oscXMax" value="5" min="0.01" max="1000" step="0.01"> s
   </div>

   <div class="sec-title">示波器 Y 轴</div>
   <div class="set-row">
     <input type="checkbox" id="oscYAuto" checked> 自动
     <input type="number" id="oscYMin" value="-1" step="0.1" style="width:46px" disabled>
     <span>~</span>
     <input type="number" id="oscYMax" value="1" step="0.1" style="width:46px" disabled>
   </div>

   <div class="sec-title">FFT 设置</div>
   <div class="set-row">
     <label>谱线数</label>
      <select id="fftLines">
        <option value="128">128</option><option value="256">256</option>
        <option value="512">512</option><option value="1024">1024</option>
        <option value="2048">2048</option><option value="4096">4096</option>
        <option value="8192" selected>8192</option><option value="16384">16384</option>
      </select>
   </div>
   <div class="set-row">
     <label>窗函数</label>
     <select id="winType">
       <option value="hann" selected>Hann (汉宁)</option>
       <option value="hamming">Hamming (汉明)</option>
       <option value="blackman">Blackman</option>
       <option value="rect">Rectangular (矩形)</option>
       <option value="flattop">Flat-top (平顶)</option>
     </select>
   </div>
   <div class="set-row">
     <label>计算上限</label>
     <input type="number" id="fftCompMax" value="10000" min="10" max="10000" step="100"> Hz
     <span class="row-hint" id="fftResHint">Δf=1.22Hz</span>
   </div>
   <div class="row-hint" style="padding-left:48px;margin-top:-2px;color:#d29922;font-size:9px">💡 分析低频信号？降低上限可触发抽取滤波，大幅提升频率分辨率</div>
   <div class="set-row">
     <label>显示范围</label>
     <input type="number" id="fftXMin" value="0" min="0" disabled> ~
     <input type="number" id="fftXMax" value="10000" min="10" max="10000" step="100"> Hz
   </div>
   <div class="set-row">
     <label>幅度Y</label>
     <input type="checkbox" id="specYAuto" checked> 自动
     <input type="number" id="specYMin" value="0" step="0.01" style="width:46px" disabled>
     <span>~</span>
     <input type="number" id="specYMax" value="1" step="0.1" style="width:46px" disabled>
   </div>

   <div class="sec-title">光标 <span class="row-hint">(Tab切换 | ←→微调 | Del删除)</span></div>

   <div class="sec-title">快速预设</div>
   <div class="preset-grid" id="presetGrid">
     <button data-p="s1">🔵 单频30Hz</button><button data-p="s2">🔵🔵 双频</button>
     <button data-p="s3">🔲 方波50Hz</button><button data-p="s4">📏 DC偏置</button>
     <button data-p="s5">▌脉冲10%</button><button data-p="s6">🔺 三角50Hz</button>
     <button data-p="s7">⏱ 时间序列</button><button data-p="s8">🌈 多波形混合</button>
   </div>

   <div class="run-bar">
     <button class="btn on" id="btnRun">▶ 运行</button>
     <button class="btn dim" id="btnReset">↺ 重置</button>
     <span class="fps"><span id="fpsLabel">60</span>FPS t=<span id="timeLabel">0.0</span>s</span>
   </div>

   <div class="sec-title" style="margin-top:4px">🔧 干扰因素 <span class="row-hint">(⚙设置 → ☐干扰)</span></div>
   <div class="factor-toggles" id="factorToggles"></div>
   <div class="factor-rows" id="factorRows"></div>
 </div>

 <div class="panel-right">
   <div class="cp osc" id="oscPanel">
     <div class="chdr">
       <span>示波器</span>
       <div class="osc-tools" id="oscTools">
         <button class="btn-tool" data-tool="zoom" title="框选放大">🔍</button>
         <button class="btn-tool" data-tool="zoomIn" title="放大20%">⊕</button>
         <button class="btn-tool" data-tool="zoomOut" title="缩小20%">⊖</button>
         <button class="btn-tool active" data-tool="none" title="默认（光标）">⊡</button>
         <button class="btn-tool" data-tool="reset" title="还原范围">↺</button>
         <button class="btn-tool" data-tool="pan" title="拖拽平移">✥</button>
       </div>
       <span class="cursor-display" id="oscCrDisplay"></span>
       <button class="btn-cursor" id="btnOscCursor">+ 光标</button>
     </div>
     <div class="cwrap" id="oscWrap"><canvas id="oscCanvas"></canvas></div>
   </div>
   <div class="cp spec" id="specPanel">
     <div class="chdr">
       <span>频谱 — <span id="specTitle">8192线 Hann</span></span>
       <span class="cursor-display" id="specCrDisplay"></span>
       <button class="btn-cursor" id="btnSpecCursor">+ 光标</button>
     </div>
     <div class="cwrap" id="specWrap"><canvas id="specCanvas"></canvas></div>
   </div>
   <div class="cp tml">
     <div class="chdr"><span>时间轴</span><span id="tmlInfo">总时长 0s</span></div>
     <div class="cwrap" id="tmlWrap"><canvas id="tmlCanvas"></canvas></div>
   </div>
 </div>
</div>

<!-- Axis edit popup -->
<div class="axis-edit" id="axisEdit">
 <input type="number" id="axisEditVal" step="any">
 <button id="axisEditOk">✓</button>
</div>

<script>
(function() {
 // ═══════════════════════════════════════════
 // Constants
 // ═══════════════════════════════════════════
 const SR = 20000;
 const RB_SECS = 30;
 const RB_SIZE = SR * RB_SECS;

 // ═══════════════════════════════════════════
 // State — Signal
 // ═══════════════════════════════════════════
 let components = [
   { type: 'sine', amp: 20, freq: 300, phase: 0, duty: 0, tStart: 0, tEnd: Infinity },
   { type: 'sine', amp: 20, freq: 50,  phase: 0, duty: 0, tStart: 0, tEnd: Infinity },
   { type: 'sine', amp: 10, freq: 700, phase: 0, duty: 0, tStart: 0, tEnd: Infinity }
 ];
 let running = false;

// Ring buffer
const rbT = new Float64Array(RB_SIZE), rbV = new Float64Array(RB_SIZE);
let rbW = 0, rbN = 0;

// ═══════════════════════════════════════════
// Interference factors
// ═══════════════════════════════════════════
const FACTOR_DEFS = [
  { id: "drift",     name: "漂移",   icon: "⏳", color: "#e67e22", configPage: "drift_config.html",
    storageKey: "piezo_factor_drift",     defaultParams: { rate: 5, sensitivity: 4.1 } },
  { id: "linearity", name: "线性度", icon: "📏", color: "#e74c3c", configPage: "linearity_config.html",
    storageKey: "piezo_factor_linearity", defaultParams: { bfsl: 0.5, fso: 1000 } },
  { id: "freqresp",  name: "频响",   icon: "📶", color: "#9b59b6", configPage: "freqresp_config.html",
    storageKey: "piezo_factor_freqresp",  defaultParams: { fn: 1.2, ms: 50, M: 50 } },
  { id: "crosstalk", name: "串扰",   icon: "↔",  color: "#f1c40f", configPage: "crosstalk_config.html",
    storageKey: "piezo_factor_crosstalk", defaultParams: { ratio: 0.5, freq: 60, amp: 5000, type: 'sine' } },
  { id: "envnoise",  name: "噪声",   icon: "🌊", color: "#2ecc71", configPage: "noise_config.html",
    storageKey: "piezo_factor_envnoise",  defaultParams: { meq: 200, noiseFloor: 5, buildingFreq: 5, buildingAmp: 0.003, machineFreq: 500, machineAmp: 0.01 } },
];
const factorParams = {};    // { drift: {rate, sensitivity}, ... }
const factorConfigured = {}; // { drift: bool, ... }
FACTOR_DEFS.forEach(def => {
  factorParams[def.id] = { ...def.defaultParams };
  factorConfigured[def.id] = false;
});
// Solo display: pick items to show individually (multi-select)
let soloSelection = { original: true, drift: false, linearity: false, freqresp: false, crosstalk: false, envnoise: false };
// Stacked display
let showStacked = false;
let stackComponents = { original: false, drift: false, linearity: false, freqresp: false, crosstalk: false, envnoise: false };

// Timing
 let lastT = performance.now(), fc = 0, fpsT = performance.now(), curFPS = 60;

 // FFT settings
 let fftLines = 4096;
 let winType = 'hann';
 let fftCompMax = 1000; // computation max freq (for decimation)
 let fftXMin = 0, fftXMax = 1000; // display range

 // Axis
 let oscYAuto = true, oscYMin = -1, oscYMax = 1;
 let specYAuto = true, specYMin = 0, specYMax = 1;

 // Time axis mode
 let oscTimeMode = 'sliding'; // 'fixed' | 'rolling' | 'sliding'
 let oscSpan = 5;       // sliding window span (seconds)
 let oscFXMin = 0, oscFXMax = 5; // fixed mode range

// Spectrum cache
let specCtr = 0, specIntv = 20;
let specFreqs = null, specMags = null;
let soloSpecs = {}; // { original: {fs,ms}, drift: {fs,ms}, ... }
let specFreqsStacked = null, specMagsStacked = null; // stacked spectrum

 // FFT tables
 let fftBitRev = null, fftTwiddle = null;
 let fftN = 16384;

 // Cursors
 const CURSOR_COLORS = ['#f0c040', '#58a6ff', '#3fb950', '#bc8cff', '#ff6bcd', '#d29922'];
 let cursorsOsc = [], cursorsSpec = [];
 let activeCursor = null; // { type: 'osc'|'spec', idx: N }
 let nextCursorId = 1;

 // Oscilloscope tool mode
 let oscTool = 'none'; // 'none' | 'zoom' | 'pan'
 let zoomDrag = null; // { x0, y0, mx, my } — canvas coords during zoom drag
 let panStart = null; // { mx, my, t0, t1, yMin, yMax } — canvas/data coords at drag start

 // Axis label hit regions (for double-click editing)
 let axisHitRegions = []; // { x, y, w, h, value, axis: 'oscX'|'oscY'|'specX'|'specY', pos: 'min'|'max' }
 let editingAxis = null; // current axis being edited
 let dblClickTimer = null;

 // ═══════════════════════════════════════════
 // FFT size from lines
 // ═══════════════════════════════════════════
 function fftSizeFromLines(lines) {
   let n = lines * 2;
   let p = 1; while (p < n) p <<= 1;
   return p;
 }

 function rebuildFFT() {
   fftN = fftSizeFromLines(fftLines);
   const n = fftN;
   fftBitRev = new Int32Array(n);
   fftBitRev[0] = 0;
   for (let i = 1; i < n; i++) {
     fftBitRev[i] = (fftBitRev[i >> 1] >> 1) | ((i & 1) << (Math.log2(n) - 1));
   }
   fftTwiddle = [];
   for (let len = 2; len <= n; len <<= 1) {
     const half = len >> 1, angle = -2 * Math.PI / len;
     fftTwiddle.push({ half, cosA: Math.cos(angle), sinA: Math.sin(angle) });
   }
   specFreqs = null; specMags = null; specCtr = 0;
   updateSpecTitle();
   updateFftResHint();
 }

 function updateSpecTitle() {
   document.getElementById('specTitle').textContent =
     (fftN >> 1) + '线 ' + winType.toUpperCase()
     + (fftCompMax < 10000 ? ' @' + fftCompMax + 'Hz' : '');
 }

 function updateFftResHint() {
   const decim = Math.max(1, Math.floor(SR / (fftCompMax * 2.05)));
   const effSR = SR / decim;
   const df = effSR / fftN;
   const el = document.getElementById('fftResHint');
   if (el) {
     el.textContent = 'Δf=' + (df < 0.01 ? df.toFixed(4) : df < 1 ? df.toFixed(3) : df.toFixed(2)) + 'Hz';
     el.style.color = df <= 0.1 ? '#3fb950' : df <= 0.5 ? '#d29922' : '#8b949e';
   }
 }

 // ═══════════════════════════════════════════
 // Window functions
 // ═══════════════════════════════════════════
 function applyWindow(data, type) {
    const n = data.length;
    const out = new Float64Array(n);
    let cg = 1;
    switch (type) {
      case 'hann':
        for (let i = 0; i < n; i++) out[i] = data[i] * 0.5 * (1 - Math.cos(2 * Math.PI * i / (n - 1)));
        cg = 0.5;
        break;
      case 'hamming':
        for (let i = 0; i < n; i++) out[i] = data[i] * (0.54 - 0.46 * Math.cos(2 * Math.PI * i / (n - 1)));
        cg = 0.54;
        break;
      case 'blackman':
        for (let i = 0; i < n; i++) {
          const a = 2 * Math.PI * i / (n - 1);
          out[i] = data[i] * (0.42 - 0.5 * Math.cos(a) + 0.08 * Math.cos(2 * a));
        }
        cg = 0.42;
        break;
      case 'flattop':
        for (let i = 0; i < n; i++) {
          const a = 2 * Math.PI * i / (n - 1);
          out[i] = data[i] * (0.21557895 - 0.41663158 * Math.cos(a) + 0.277263158 * Math.cos(2 * a)
            - 0.083578947 * Math.cos(3 * a) + 0.006947368 * Math.cos(4 * a));
        }
        cg = 0.21557895;
        break;
      default:
        for (let i = 0; i < n; i++) out[i] = data[i];
        cg = 1;
    }
    return { data: out, cg };
  }  // ═══════════════════════════════════════════
 // Signal generation
 // ═══════════════════════════════════════════
 function activeComps(t) {
   return components.filter(c => t >= c.tStart - 1e-9 && t <= c.tEnd + 1e-9);
 }

 function genSample(t) {
   let s = 0;
   for (const c of activeComps(t)) {
     if (c.freq === 0) { s += c.amp; continue; }
     const w = 2 * Math.PI * c.freq, phi = c.phase * Math.PI / 180;
     const per = 1 / c.freq, duty = c.duty;
     switch (c.type) {
       case 'sine': s += c.amp * Math.sin(w * t + phi); break;
       case 'square': {
         const tm = ((t + c.phase / 360 * per) % per + per) % per;
         s += (tm < duty * per) ? c.amp : -c.amp; break;
       }
       case 'pulse': {
         const tm = ((t + c.phase / 360 * per) % per + per) % per;
         s += (tm < duty * per) ? c.amp : 0; break;
       }
       case 'triangle': {
         const tm = ((t + c.phase / 360 * per) % per + per) % per, r = tm / per;
         if (r < 0.25) s += c.amp * 4 * r;
         else if (r < 0.75) s += c.amp * (2 - 4 * r);
         else s += c.amp * (4 * r - 4);
         break;
       }
     }
   }
  return s;
}

// Factor deviation: single factor's contribution at time t
function factorDeviation(factorId, t) {
  const p = factorParams[factorId];
  const clean = genSample(t);
  switch (factorId) {
    case "drift":     return (p.rate / p.sensitivity) * t;
    case "linearity": return (p.bfsl / 100) * p.fso; // constant error band half-width
    case "freqresp": {
      const fn_prime = p.fn * 1000 * Math.sqrt(p.ms / (p.ms + p.M));
      const zeta = 0.05;
      let mod = 0;
      for (const c of activeComps(t)) {
        if (c.freq === 0) { mod += c.amp; continue; }
        const ratio = c.freq / fn_prime;
        const denom = Math.sqrt((1-ratio*ratio)*(1-ratio*ratio) + (2*zeta*ratio)*(2*zeta*ratio));
        mod += c.amp / denom * Math.sin(2*Math.PI*c.freq*t + c.phase*Math.PI/180 - Math.atan2(2*zeta*ratio, 1-ratio*ratio));
      }
      return mod - clean;
    }
    case "crosstalk": {
      // Independent crosstalk source signal (from the other axis)
      const ratio = p.ratio / 100;
      const srcW = 2 * Math.PI * p.freq;
      let srcSig = 0;
      switch (p.type) {
        case 'sine':   srcSig = p.amp * Math.sin(srcW * t); break;
        case 'square': srcSig = p.amp * (Math.sin(srcW * t) >= 0 ? 1 : -1); break;
        case 'triangle': {
          const tm = ((t * p.freq) % 1 + 1) % 1;
          srcSig = p.amp * (tm < 0.25 ? 4*tm : tm < 0.75 ? 2-4*tm : 4*tm-4);
          break;
        }
        default: srcSig = p.amp * Math.sin(srcW * t);
      }
      return srcSig * ratio;
    }
    case "envnoise": {
      const rnd = (seed) => { const x = Math.sin(seed) * 43758.5453; return x - Math.floor(x); };
      let force_N = (rnd(t * 7919) * 2 - 1) * p.noiseFloor;
      if (p.buildingFreq > 0) force_N += p.buildingAmp * p.meq * 9.81 * Math.sin(2 * Math.PI * p.buildingFreq * t);
      if (p.machineFreq > 0) force_N += p.machineAmp * p.meq * 9.81 * Math.sin(2 * Math.PI * p.machineFreq * t);
      return force_N;
    }
    default: return 0;
  }
}

function soloSignal(id, t) {
  if (id === 'original') return genSample(t);
  return factorDeviation(id, t);
}

function stackedSignal(t) {
  let s = 0;
  if (stackComponents.original) s += genSample(t);
  FACTOR_DEFS.forEach(def => {
    if (stackComponents[def.id]) s += factorDeviation(def.id, t);
  });
  return s;
}

// Stacked signal excluding a specific factor (for band drawing)
function stackedSignalWithout(factorId, t) {
  let s = 0;
  if (stackComponents.original) s += genSample(t);
  FACTOR_DEFS.forEach(def => {
    if (def.id !== factorId && stackComponents[def.id]) s += factorDeviation(def.id, t);
  });
  return s;
}

function genSamples(t0, t1) {
  const dt = 1 / SR;
  for (let t = t0; t < t1; t += dt) {
    rbT[rbW] = t; rbV[rbW] = genSample(t);
    rbW = (rbW + 1) % RB_SIZE; rbN++;
  }
}

function readLast(n) {
  if (n > RB_SIZE) n = RB_SIZE; if (n > rbN) n = rbN;
  const ts = new Float64Array(n), vs = new Float64Array(n);
  const start = (rbW - n + RB_SIZE) % RB_SIZE;
  for (let i = 0; i < n; i++) {
    const idx = (start + i) % RB_SIZE; ts[i] = rbT[idx]; vs[i] = rbV[idx];
  }
  return { ts, vs };
}


 // Binary search in ring buffer to find first index >= target time
 function rbBinarySearch(targetT) {
   if (rbN === 0) return 0;
   const maxN = Math.min(rbN, RB_SIZE);
   const base = (rbW - maxN + RB_SIZE) % RB_SIZE;
   let lo = 0, hi = maxN;
   while (lo < hi) {
     const mid = (lo + hi) >> 1;
     const idx = (base + mid) % RB_SIZE;
if (rbT[idx] < targetT) lo = mid + 1;
      else hi = mid;
    }
    return lo;
  }

  // Read data in a time range [t0, t1] — uses binary search, O(log N + samples)
  function readRange(t0, t1) {
    if (rbN === 0) return { ts: new Float64Array(0), vs: new Float64Array(0) };
    const maxN = Math.min(rbN, RB_SIZE);
    const base = (rbW - maxN + RB_SIZE) % RB_SIZE;
    const si = Math.min(rbBinarySearch(t0 - 1e-9), maxN);
    const result = [];
    for (let i = si; i < maxN; i++) {
      const idx = (base + i) % RB_SIZE;
      if (rbT[idx] > t1 + 1e-9) break;
      result.push({ t: rbT[idx], v: rbV[idx] });
    }
    const ts = new Float64Array(result.length), vs = new Float64Array(result.length);
    for (let i = 0; i < result.length; i++) { ts[i] = result[i].t; vs[i] = result[i].v; }
    return { ts, vs };
  }

  // Get oscilloscope data based on time mode
  function getOscData() {
    const now = rbN / SR;
    let t0, t1, data;
    switch (oscTimeMode) {
      case 'fixed':
        t0 = oscFXMin; t1 = oscFXMax;
        data = readRange(t0, t1);
        break;
      case 'rolling':
        t0 = 0; t1 = Math.max(now, 1);
        data = readRange(t0, t1);
        break;
      case 'sliding':
      default:
        t1 = now;
        t0 = Math.max(0, now - oscSpan);
        const n = Math.floor(Math.min(oscSpan, RB_SECS) * SR);
        data = readLast(Math.min(n, rbN));
        break;
    }
    return { data, t0: data.ts.length > 0 ? data.ts[0] : t0, t1: data.ts.length > 0 ? data.ts[data.ts.length - 1] : t1 };
  }

  // ═══════════════════════════════════════════
  // FFT
  // ═══════════════════════════════════════════
  function doFFT(re, im) {
    const n = re.length;
    for (let i = 0; i < n; i++) {
      const j = fftBitRev[i]; if (i < j) { [re[i], re[j]] = [re[j], re[i]]; [im[i], im[j]] = [im[j], im[i]]; }
    }
    for (const st of fftTwiddle) {
      const { half, cosA, sinA } = st;
      for (let i = 0; i < n; i += half * 2) {
        let cr = 1, ci = 0;
        for (let j = 0; j < half; j++) {
          const aR = re[i + j], aI = im[i + j];
          const bR = re[i + j + half] * cr - im[i + j + half] * ci;
          const bI = re[i + j + half] * ci + im[i + j + half] * cr;
          re[i + j] = aR + bR; im[i + j] = aI + bI;
          re[i + j + half] = aR - bR; im[i + j + half] = aI - bI;
          const nR = cr * cosA - ci * sinA, nI = cr * sinA + ci * cosA;
          cr = nR; ci = nI;
        }
      }
    }
  }

  function computeSpectrum() {
    if (rbN < fftN) return { fs: new Float64Array(0), ms: new Float64Array(0) };

    const nyq = SR / 2;
    const effMax = Math.min(fftCompMax, nyq);
    const decim = Math.max(1, Math.floor(SR / (effMax * 2.05)));
    const effSR = SR / decim;

    let data;
    if (decim > 1) {
      const rawN = fftN * decim;
      const { vs: rawVs } = readLast(Math.min(rawN, rbN));
      if (rawVs.length >= rawN) {
        const filtered = new Float64Array(rawVs.length - decim + 1);
        let sum = 0;
        for (let i = 0; i < decim; i++) sum += rawVs[i];
        filtered[0] = sum / decim;
        for (let i = decim; i < rawVs.length; i++) {
          sum += rawVs[i] - rawVs[i - decim];
          filtered[i - decim + 1] = sum / decim;
        }
        data = new Float64Array(fftN);
        for (let i = 0; i < fftN; i++) data[i] = filtered[i * decim];
      } else {
        const { vs } = readLast(fftN);
        data = vs;
      }
    } else {
      const { vs } = readLast(fftN);
      data = vs;
    }
    if (data.length < fftN) return { fs: new Float64Array(0), ms: new Float64Array(0) };

    const wRes = applyWindow(data, winType);
    const wData = wRes.data, wCG = wRes.cg;
    const re = new Float64Array(wData), im = new Float64Array(fftN);
    doFFT(re, im);

    const half = fftN >> 1;
    const fs = new Float64Array(half), ms = new Float64Array(half);
    for (let i = 0; i < half; i++) {
      fs[i] = (i / fftN) * effSR;
      const rawMag = (i === 0) ? Math.abs(re[0]) / fftN
        : Math.sqrt(re[i] * re[i] + im[i] * im[i]) / fftN * 2;
      ms[i] = rawMag / wCG;
    }
    return { fs, ms };
  }

  // Generic: compute FFT for any signal function
  function computeSpectrumFor(signalFn) {
    if (rbN < fftN) return { fs: new Float64Array(0), ms: new Float64Array(0) };
    const nyq = SR / 2;
    const effMax = Math.min(fftCompMax, nyq);
    const decim = Math.max(1, Math.floor(SR / (effMax * 2.05)));
    const effSR = SR / decim;
    const n = Math.min(fftN * decim, rbN);
    const { ts } = readLast(n);
    if (ts.length < fftN) return { fs: new Float64Array(0), ms: new Float64Array(0) };
    let data;
    if (decim > 1 && ts.length >= fftN * decim) {
      const rawN = fftN * decim;
      const rawVs = new Float64Array(ts.length);
      for (let i = 0; i < ts.length; i++) rawVs[i] = signalFn(ts[i]);
      const filtered = new Float64Array(rawVs.length - decim + 1);
      let sum = 0;
      for (let i = 0; i < decim; i++) sum += rawVs[i];
      filtered[0] = sum / decim;
      for (let i = decim; i < rawVs.length; i++) {
        sum += rawVs[i] - rawVs[i - decim];
        filtered[i - decim + 1] = sum / decim;
      }
      data = new Float64Array(fftN);
      for (let i = 0; i < fftN; i++) data[i] = filtered[i * decim];
    } else {
      data = new Float64Array(fftN);
      for (let i = 0; i < fftN; i++) data[i] = signalFn(ts[i]);
    }
    if (data.length < fftN) return { fs: new Float64Array(0), ms: new Float64Array(0) };
    const wRes = applyWindow(data, winType);
    const re = new Float64Array(wRes.data), im = new Float64Array(fftN);
    doFFT(re, im);
    const half = fftN >> 1;
    const fs = new Float64Array(half), ms = new Float64Array(half);
    for (let i = 0; i < half; i++) {
      fs[i] = (i / fftN) * effSR;
      ms[i] = ((i === 0 ? Math.abs(re[0]) : Math.sqrt(re[i]*re[i] + im[i]*im[i]) * 2) / fftN) / wRes.cg;
    }
    return { fs, ms };
  }

  function computeStackedSpectrum() { return computeSpectrumFor(stackedSignal); }



  // ═══════════════════════════════════════════
  // Canvas helper
  // ═══════════════════════════════════════════
  const oCv = document.getElementById('oscCanvas'), sCv = document.getElementById('specCanvas');
  const tCv = document.getElementById('tmlCanvas');
  const oWr = document.getElementById('oscWrap'), sWr = document.getElementById('specWrap');
  const tWr = document.getElementById('tmlWrap');

  function rc(cv, wr) {
    const dpr = window.devicePixelRatio || 1;
    const w = wr.clientWidth, h = wr.clientHeight;
    if (w <= 0 || h <= 0) return null;
    cv.width = w * dpr; cv.height = h * dpr;
    cv.style.width = w + 'px'; cv.style.height = h + 'px';
    return { w, h, dpr };
  }

  function niceStep(range, maxTicks) {
    const rough = range / maxTicks;
    const exp = Math.pow(10, Math.floor(Math.log10(rough)));
    const rem = rough / exp;
    if (rem <= 1.5) return exp;
    if (rem <= 3.5) return 2 * exp;
    if (rem <= 7.5) return 5 * exp;
    return 10 * exp;
  }

  function roundRectPath(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  // ═══════════════════════════════════════════
  // Draw Oscilloscope
  // ═══════════════════════════════════════════
  function drawOsc() {
    const d = rc(oCv, oWr); if (!d) return;
    const { w, h, dpr } = d;
    const ctx = oCv.getContext('2d');
    ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.scale(dpr, dpr);
    ctx.fillStyle = '#0a0e13'; ctx.fillRect(0, 0, w, h);

    const M = { L: 52, R: w - 14, T: 8, B: h - 24 };
    const pw = M.R - M.L, ph = M.B - M.T;
    if (ph <= 0 || pw <= 0) return;

    const { data, t0, t1 } = getOscData();
    const { ts, vs } = data;
    if (vs.length < 2) return;

    let yMin, yMax;
    if (oscYAuto) {
      yMin = Infinity; yMax = -Infinity;
      // Scan all checked solo traces
      const step = Math.max(1, Math.floor(vs.length / 100));
      SOLO_OPTIONS.forEach(opt => {
        if (!soloSelection[opt.id]) return;
        if (opt.id === 'linearity') {
          // Linearity: error band, scan upper/lower bounds
          const err = factorDeviation('linearity', 0); // constant
          for (let i = 0; i < vs.length; i += step) {
            const clean = genSample(ts[i]);
            if (clean + err < yMin) yMin = clean + err;
            if (clean + err > yMax) yMax = clean + err;
            if (clean - err < yMin) yMin = clean - err;
            if (clean - err > yMax) yMax = clean - err;
          }
        } else {
          for (let i = 0; i < vs.length; i += step) {
            const v = soloSignal(opt.id, ts[i]);
            if (v < yMin) yMin = v; if (v > yMax) yMax = v;
          }
        }
      });
      // Scan stacked trace
      if (showStacked) {
        if (stackComponents.linearity) {
          // Linearity in stack: scan band boundaries
          const linErr = (factorParams.linearity.bfsl / 100) * factorParams.linearity.fso;
          for (let i = 0; i < vs.length; i += step) {
            const baseV = stackedSignalWithout('linearity', ts[i]);
            if (baseV + linErr > yMax) yMax = baseV + linErr;
            if (baseV - linErr < yMin) yMin = baseV - linErr;
          }
        } else {
          for (let i = 0; i < vs.length; i += step) {
            const v = stackedSignal(ts[i]);
            if (v < yMin) yMin = v; if (v > yMax) yMax = v;
          }
        }
      }
      if (!isFinite(yMin)) { yMin = -1; yMax = 1; }
      const yr = yMax - yMin || 1; yMin -= yr * 0.15; yMax += yr * 0.15;
    } else { yMin = oscYMin; yMax = oscYMax; }

    const tSpan = t1 - t0 || 0.001;
    const toX = t => M.L + ((t - t0) / tSpan) * pw;
    const toY = v => M.B - ((v - yMin) / (yMax - yMin || 1)) * ph;

    axisHitRegions = axisHitRegions.filter(r => !r.chart || r.chart !== 'osc');

    ctx.save();
    ctx.beginPath(); ctx.rect(M.L, M.T, pw, ph); ctx.clip();

    // Grid
    ctx.strokeStyle = '#1a2230'; ctx.lineWidth = 0.5;
    const tStep = niceStep(tSpan, 8);
    for (let tg = Math.ceil(t0 / tStep) * tStep; tg <= t1; tg += tStep) {
      ctx.beginPath(); ctx.moveTo(toX(tg), M.T); ctx.lineTo(toX(tg), M.B); ctx.stroke();
    }
    const yStep = niceStep(yMax - yMin, 8);
    for (let yg = Math.ceil(yMin / yStep) * yStep; yg <= yMax; yg += yStep) {
      ctx.beginPath(); ctx.moveTo(M.L, toY(yg)); ctx.lineTo(M.R, toY(yg)); ctx.stroke();
    }
    // Zero line
    const y0 = toY(0);
    if (y0 >= M.T && y0 <= M.B) {
      ctx.strokeStyle = '#5a6a80'; ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(M.L, y0); ctx.lineTo(M.R, y0); ctx.stroke();
      ctx.setLineDash([]);
    }

    // Waveform
    const skip = Math.max(1, Math.floor(vs.length / (pw * 2)));
    let first = true;

    // Solo traces: one per checked item, each in its own color
    // Linearity is special: error band (upper/lower bounds + fill) instead of single deviation line
    SOLO_OPTIONS.forEach(opt => {
      if (!soloSelection[opt.id]) return;
      if (opt.id === 'linearity') {
        const err = factorDeviation('linearity', 0); // constant error
        // Fill band
        ctx.fillStyle = opt.color + '14'; // ~8% opacity
        ctx.beginPath();
        first = true;
        for (let i = 0; i < vs.length; i += skip) {
          const t = ts[i]; const clean = genSample(t);
          const px = toX(t), pyU = toY(clean + err);
          if (first) { ctx.moveTo(px, pyU); first = false; } else ctx.lineTo(px, pyU);
        }
        if (skip > 1) { const li = vs.length - 1; ctx.lineTo(toX(ts[li]), toY(genSample(ts[li]) + err)); }
        // Bottom boundary (reverse)
        for (let i = vs.length - 1; i >= 0; i -= skip) {
          ctx.lineTo(toX(ts[i]), toY(genSample(ts[i]) - err));
        }
        ctx.closePath(); ctx.fill();
        // Upper boundary line
        ctx.strokeStyle = opt.color; ctx.lineWidth = 1.2; ctx.setLineDash([5, 4]); ctx.lineJoin = 'round';
        ctx.beginPath(); first = true;
        for (let i = 0; i < vs.length; i += skip) {
          const t = ts[i]; const px = toX(t), py = toY(genSample(t) + err);
          if (first) { ctx.moveTo(px, py); first = false; } else ctx.lineTo(px, py);
        }
        if (skip > 1) { const li = vs.length - 1; ctx.lineTo(toX(ts[li]), toY(genSample(ts[li]) + err)); }
        ctx.stroke();
        // Lower boundary line
        ctx.beginPath(); first = true;
        for (let i = 0; i < vs.length; i += skip) {
          const t = ts[i]; const px = toX(t), py = toY(genSample(t) - err);
          if (first) { ctx.moveTo(px, py); first = false; } else ctx.lineTo(px, py);
        }
        if (skip > 1) { const li = vs.length - 1; ctx.lineTo(toX(ts[li]), toY(genSample(ts[li]) - err)); }
        ctx.stroke();
        ctx.setLineDash([]);
      } else {
        ctx.strokeStyle = opt.color; ctx.lineWidth = 1.8; ctx.lineJoin = 'round'; ctx.setLineDash([]);
        ctx.beginPath();
        first = true;
        for (let i = 0; i < vs.length; i += skip) {
          const t = ts[i];
          const v = soloSignal(opt.id, t);
          const px = toX(t), py = toY(v);
          if (first) { ctx.moveTo(px, py); first = false; } else ctx.lineTo(px, py);
        }
        if (skip > 1) { const li = vs.length - 1; ctx.lineTo(toX(ts[li]), toY(soloSignal(opt.id, ts[li]))); }
        ctx.stroke();
      }
    });

    // ── Stacked result (yellow, if enabled) ──
    if (showStacked) {
      if (stackComponents.linearity && factorParams.linearity) {
        // Linearity is in the stack → draw tolerance band
        const linErr = (factorParams.linearity.bfsl / 100) * factorParams.linearity.fso;
        // Fill band: upper boundary forward, lower boundary backward
        ctx.fillStyle = 'rgba(224,168,48,0.10)';
        ctx.beginPath();
        for (let i = 0; i < vs.length; i += skip) {
          const t = ts[i];
          const baseV = stackedSignalWithout('linearity', t);
          const px = toX(t), py = toY(baseV + linErr);
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        for (let i = vs.length - 1; i >= 0; i -= skip) {
          const t = ts[i];
          const px = toX(t), py = toY(stackedSignalWithout('linearity', t) - linErr);
          ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.fill();
        // Upper boundary dashed
        ctx.strokeStyle = '#e0a830'; ctx.lineWidth = 1.2; ctx.setLineDash([5, 4]);
        ctx.beginPath();
        for (let i = 0; i < vs.length; i += skip) {
          const t = ts[i];
          const px = toX(t), py = toY(stackedSignalWithout('linearity', t) + linErr);
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        if (skip > 1) { const li = vs.length - 1; ctx.lineTo(toX(ts[li]), toY(stackedSignalWithout('linearity', ts[li]) + linErr)); }
        ctx.stroke();
        // Lower boundary dashed
        ctx.beginPath();
        for (let i = 0; i < vs.length; i += skip) {
          const t = ts[i];
          const px = toX(t), py = toY(stackedSignalWithout('linearity', t) - linErr);
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        if (skip > 1) { const li = vs.length - 1; ctx.lineTo(toX(ts[li]), toY(stackedSignalWithout('linearity', ts[li]) - linErr)); }
        ctx.stroke();
        ctx.setLineDash([]);
        // Center line (base signal) solid
        ctx.strokeStyle = '#e0a830'; ctx.lineWidth = 1.8; ctx.lineJoin = 'round';
        ctx.beginPath();
        for (let i = 0; i < vs.length; i += skip) {
          const t = ts[i];
          const px = toX(t), py = toY(stackedSignalWithout('linearity', t));
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        if (skip > 1) { const li = vs.length - 1; ctx.lineTo(toX(ts[li]), toY(stackedSignalWithout('linearity', ts[li]))); }
        ctx.stroke();
      } else {
        // Normal single-line stacked trace (no linearity)
        ctx.strokeStyle = '#e0a830'; ctx.lineWidth = 1.8; ctx.lineJoin = 'round';
        ctx.setLineDash([]);
        ctx.beginPath();
        first = true;
        for (let i = 0; i < vs.length; i += skip) {
          const t = ts[i];
          const v = stackedSignal(t);
          const px = toX(t), py = toY(v);
          if (first) { ctx.moveTo(px, py); first = false; } else ctx.lineTo(px, py);
        }
        if (skip > 1) { const li = vs.length - 1; ctx.lineTo(toX(ts[li]), toY(stackedSignal(ts[li]))); }
        ctx.stroke();
      }
    }

    // Cursors
    for (let ci = 0; ci < cursorsOsc.length; ci++) {
      const cr = cursorsOsc[ci];
      const tClamp = Math.max(t0, Math.min(t1, cr.t));
      const si = Math.round((tClamp - t0) / tSpan * (vs.length - 1));
      const snapT = ts[Math.max(0, Math.min(vs.length - 1, si))];
      const snapV = vs[Math.max(0, Math.min(vs.length - 1, si))];
      const cx = toX(snapT), cy = toY(snapV);

      const isActive = activeCursor && activeCursor.type === 'osc' && activeCursor.idx === ci;
      ctx.strokeStyle = cr.color || CURSOR_COLORS[ci % CURSOR_COLORS.length];
      ctx.lineWidth = isActive ? 1.5 : 1;
      ctx.setLineDash(isActive ? [] : [3, 2]);
      ctx.beginPath(); ctx.moveTo(cx, M.T); ctx.lineTo(cx, M.B); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(M.L, cy); ctx.lineTo(M.R, cy); ctx.stroke();
      ctx.setLineDash([]);

      cr.t = snapT; cr.v = snapV;
    }

    // Zoom rubber band
    if (zoomDrag) {
      const rx0 = Math.min(zoomDrag.x0, zoomDrag.mx), rx1 = Math.max(zoomDrag.x0, zoomDrag.mx);
      const ry0 = Math.min(zoomDrag.y0, zoomDrag.my), ry1 = Math.max(zoomDrag.y0, zoomDrag.my);
      ctx.fillStyle = 'rgba(88,166,255,0.12)';
      ctx.fillRect(rx0, ry0, rx1 - rx0, ry1 - ry0);
      ctx.strokeStyle = 'rgba(88,166,255,0.6)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 3]);
      ctx.strokeRect(rx0, ry0, rx1 - rx0, ry1 - ry0);
      ctx.setLineDash([]);
    }

    ctx.restore();

    // X-axis labels
    ctx.fillStyle = '#8b949e'; ctx.font = '9px -apple-system, sans-serif'; ctx.textAlign = 'center';
    const xMinX = toX(t0), xMaxX = toX(t1);
    axisHitRegions.push(
      { x: xMinX - 18, y: M.B + 2, w: 36, h: 14, value: t0, axis: 'oscX', chart: 'osc', pos: 'min' },
      { x: xMaxX - 18, y: M.B + 2, w: 36, h: 14, value: t1, axis: 'oscX', chart: 'osc', pos: 'max' }
    );
    for (let tl = Math.ceil(t0 / tStep) * tStep; tl <= t1; tl += tStep) {
      ctx.fillText(tl.toFixed(tSpan < 0.1 ? 3 : tSpan < 1 ? 2 : tSpan < 10 ? 1 : 0) + 's', toX(tl), M.B + 12);
    }
    // Y-axis labels
    ctx.textAlign = 'right';
    const yMinY = toY(yMin), yMaxY = toY(yMax);
    axisHitRegions.push(
      { x: M.L - 48, y: yMinY - 7, w: 42, h: 14, value: yMin, axis: 'oscY', chart: 'osc', pos: 'min' },
      { x: M.L - 48, y: yMaxY - 7, w: 42, h: 14, value: yMax, axis: 'oscY', chart: 'osc', pos: 'max' }
    );
    for (let yl = Math.ceil(yMin / yStep) * yStep; yl <= yMax; yl += yStep) {
      const ly = toY(yl);
      const label = Math.abs(yl) < 0.01 ? '0' : Math.abs(yl) >= 1000 ? (yl/1000).toFixed(1)+'k'
        : Math.abs(yl) >= 1 ? yl.toFixed(2) : yl.toFixed(4);
      ctx.fillText(label, M.L - 5, ly + 3);
      axisHitRegions.push({ x: M.L - 48, y: ly - 7, w: 42, h: 14, value: yl, axis: 'oscY', chart: 'osc',
        pos: Math.abs(yl - yMin) < yStep * 0.01 ? 'min' : (Math.abs(yl - yMax) < yStep * 0.01 ? 'max' : 'mid') });
    }

    updateCursorDisplay();
  }

  // ═══════════════════════════════════════════
  // Draw Spectrum (linear-linear)
  // ═══════════════════════════════════════════
  function drawSpec() {
    const d = rc(sCv, sWr); if (!d) return;
    const { w, h, dpr } = d;
    const ctx = sCv.getContext('2d');
    ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.scale(dpr, dpr);
    ctx.fillStyle = '#0a0e13'; ctx.fillRect(0, 0, w, h);

    if (!specFreqs || specFreqs.length < 2) {
      ctx.fillStyle = '#8b949e'; ctx.font = '12px -apple-system, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(rbN < fftN ? '采集数据中...(' + rbN + '/' + fftN + ')' : '计算中...', w / 2, h / 2);
      return;
    }

    const M = { L: 52, R: w - 14, T: 8, B: h - 26 };
    const pw = M.R - M.L, ph = M.B - M.T;
    if (ph <= 0 || pw <= 0) return;

    const fs = specFreqs, ms = specMags;
    const fDispMax = Math.min(fftXMax, SR / 2);
    const fDispMin = fftXMin;

    const toX = f => M.L + ((f - fDispMin) / (fDispMax - fDispMin || 1)) * pw;

    let magMax = 0;
    // Scan all checked solo spectra
    SOLO_OPTIONS.forEach(opt => {
      if (!soloSelection[opt.id]) return;
      const sp = soloSpecs[opt.id];
      if (!sp || sp.fs.length < 2) return;
      for (let i = 0; i < sp.fs.length && sp.fs[i] <= fDispMax; i++) {
        if (sp.ms[i] > magMax) magMax = sp.ms[i];
      }
    });
    // Scan stacked spectrum
    if (showStacked && specFreqsStacked && specMagsStacked && specFreqsStacked.length > 1) {
      for (let i = 0; i < specFreqsStacked.length && specFreqsStacked[i] <= fDispMax; i++) {
        if (specMagsStacked[i] > magMax) magMax = specMagsStacked[i];
      }
    }

    let dispYMin, dispYMax;
    if (specYAuto) {
      dispYMin = 0;
      dispYMax = magMax * 1.1 || 1;
    } else {
      dispYMin = specYMin;
      dispYMax = specYMax;
    }

    const yRange = dispYMax - dispYMin || 1;
    const toY = m => M.B - ((m - dispYMin) / yRange) * ph;

    axisHitRegions = axisHitRegions.filter(r => !r.chart || r.chart !== 'spec');

    ctx.save();
    ctx.beginPath(); ctx.rect(M.L, M.T, pw, ph); ctx.clip();

    // Grid
    ctx.strokeStyle = '#1a2230'; ctx.lineWidth = 0.5;
    const fStep = niceStep(fDispMax - fDispMin, 8);
    for (let fg = Math.ceil(fDispMin / fStep) * fStep; fg <= fDispMax; fg += fStep) {
      ctx.beginPath(); ctx.moveTo(toX(fg), M.T); ctx.lineTo(toX(fg), M.B); ctx.stroke();
    }
    const yStep = niceStep(yRange, 6);
    for (let yg = Math.ceil(dispYMin / yStep) * yStep; yg <= dispYMax; yg += yStep) {
      const py = toY(yg);
      ctx.beginPath(); ctx.moveTo(M.L, py); ctx.lineTo(M.R, py); ctx.stroke();
    }

    // Spectrum fill
    const dec = Math.max(1, Math.floor(fs.length / (pw * 1.5)));
    ctx.beginPath();
    let first2 = true, px0 = 0;
    for (let i = 0; i < fs.length; i += dec) {
      if (fs[i] > fDispMax) break;
      let mx = 0, mxF = fs[i];
      for (let j = i; j < Math.min(i + dec, fs.length) && fs[j] <= fDispMax; j++) {
        if (ms[j] > mx) { mx = ms[j]; mxF = fs[j]; }
      }
      const px = toX(mxF), py = toY(mx);
      if (first2) { ctx.moveTo(px, M.B); ctx.lineTo(px, py); first2 = false; }
      else {
        if (px - px0 > 3) { ctx.lineTo(px0 + 1, M.B); ctx.lineTo(px, py); }
        else ctx.lineTo(px, py);
      }
      px0 = px;
    }
    ctx.lineTo(toX(fDispMax), M.B); ctx.closePath();
    ctx.fillStyle = 'rgba(88,166,255,0.09)'; ctx.fill();
    ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 1; ctx.stroke();
    // Draw solo spectra (one per checked item)
    SOLO_OPTIONS.forEach(opt => {
      if (!soloSelection[opt.id]) return;
      const sp = soloSpecs[opt.id];
      if (!sp || sp.fs.length < 2) return;
      ctx.beginPath();
      first2 = true; px0 = 0;
      for (let i = 0; i < sp.fs.length; i += dec) {
        if (sp.fs[i] > fDispMax) break;
        let mx = 0, mxF = sp.fs[i];
        for (let j = i; j < Math.min(i + dec, sp.fs.length) && sp.fs[j] <= fDispMax; j++) {
          if (sp.ms[j] > mx) { mx = sp.ms[j]; mxF = sp.fs[j]; }
        }
        const px = toX(mxF), py = toY(mx);
        if (first2) { ctx.moveTo(px, M.B); ctx.lineTo(px, py); first2 = false; }
        else {
          if (px - px0 > 3) { ctx.lineTo(px0 + 1, M.B); ctx.lineTo(px, py); }
          else ctx.lineTo(px, py);
        }
        px0 = px;
      }
      ctx.lineTo(toX(fDispMax), M.B); ctx.closePath();
      const r = parseInt(opt.color.slice(1,3), 16);
      const g = parseInt(opt.color.slice(3,5), 16);
      const b = parseInt(opt.color.slice(5,7), 16);
      ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',0.06)'; ctx.fill();
      ctx.strokeStyle = opt.color; ctx.lineWidth = 1; ctx.stroke();
    });

    // ── Stacked result spectrum ──
    if (showStacked && specFreqsStacked && specMagsStacked && specFreqsStacked.length > 1) {
      const fsD = specFreqsStacked, msD = specMagsStacked;
      ctx.beginPath();
      first2 = true; px0 = 0;
      for (let i = 0; i < fsD.length; i += dec) {
        if (fsD[i] > fDispMax) break;
        let mx = 0, mxF = fsD[i];
        for (let j = i; j < Math.min(i + dec, fsD.length) && fsD[j] <= fDispMax; j++) {
          if (msD[j] > mx) { mx = msD[j]; mxF = fsD[j]; }
        }
        const px = toX(mxF), py = toY(mx);
        if (first2) { ctx.moveTo(px, M.B); ctx.lineTo(px, py); first2 = false; }
        else {
          if (px - px0 > 3) { ctx.lineTo(px0 + 1, M.B); ctx.lineTo(px, py); }
          else ctx.lineTo(px, py);
        }
        px0 = px;
      }
      ctx.lineTo(toX(fDispMax), M.B); ctx.closePath();
      ctx.fillStyle = 'rgba(224,168,48,0.07)'; ctx.fill();
      ctx.strokeStyle = '#e0a830'; ctx.lineWidth = 1; ctx.stroke();
    }

    // Component markers
    const colors = ['#f0c040', '#f85149', '#3fb950', '#d29922', '#bc8cff', '#ff6bcd'];
    const now = rbN / SR;
    for (let ci = 0; ci < activeComps(now).length; ci++) {
      const c = activeComps(now)[ci];
      if (c.freq === 0 || c.freq < fDispMin || c.freq > fDispMax) continue;
      const binW = fs.length > 1 ? fs[1] : SR / fftN;
      const px = toX(c.freq), bi = Math.round(c.freq / binW);
      const mag = (bi >= 0 && bi < ms.length) ? ms[bi] : 0;
      const py = toY(Math.max(mag, 1e-6));
      ctx.fillStyle = colors[ci % colors.length];
      ctx.beginPath(); ctx.arc(px, py, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillText(c.freq.toFixed(0) + 'Hz', px, py - 8);
    }
    if (ms.length > 0 && ms[0] > 1e-4) {
      ctx.fillStyle = '#f0c040'; ctx.beginPath();
      const dcX = M.L + 10, dcY = toY(ms[0]);
      ctx.arc(dcX, dcY, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillText('DC ' + ms[0].toFixed(2), dcX + 7, dcY + 3);
    }

    // Cursors
    const effSR = fs.length > 1 ? fs[1] * fftN : SR;
    for (let ci = 0; ci < cursorsSpec.length; ci++) {
      const cr = cursorsSpec[ci];
      const bi = Math.round(cr.freq / effSR * fftN);
      const mag = (bi >= 0 && bi < ms.length) ? ms[bi] : 0;
      const cx = toX(cr.freq), cy = toY(Math.max(mag, 1e-6));
      const isActive = activeCursor && activeCursor.type === 'spec' && activeCursor.idx === ci;
      ctx.strokeStyle = isActive ? '#f85149' : '#f0c040';
      ctx.lineWidth = isActive ? 1.5 : 1;
      ctx.setLineDash(isActive ? [] : [3, 2]);
      ctx.beginPath(); ctx.moveTo(cx, M.T); ctx.lineTo(cx, M.B); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(M.L, cy); ctx.lineTo(M.R, cy); ctx.stroke();
      ctx.setLineDash([]);
      cr.mag = mag;
    }

    ctx.restore();

    // X-axis labels
    ctx.fillStyle = '#8b949e'; ctx.font = '9px -apple-system, sans-serif'; ctx.textAlign = 'center';
    const sxMinX = toX(fDispMin), sxMaxX = toX(fDispMax);
    axisHitRegions.push(
      { x: sxMinX - 18, y: M.B + 2, w: 36, h: 14, value: fDispMin, axis: 'specX', chart: 'spec', pos: 'min' },
      { x: sxMaxX - 18, y: M.B + 2, w: 36, h: 14, value: fDispMax, axis: 'specX', chart: 'spec', pos: 'max' }
    );
    for (let fl = Math.ceil(fDispMin / fStep) * fStep; fl <= fDispMax; fl += fStep) {
      ctx.fillText(fl >= 1000 ? (fl / 1000).toFixed(1) + 'k' : fl.toFixed(0), toX(fl), M.B + 12);
    }
    ctx.textAlign = 'right';
    const syMinY = toY(dispYMin), syMaxY = toY(dispYMax);
    axisHitRegions.push(
      { x: M.L - 48, y: syMinY - 7, w: 42, h: 14, value: dispYMin, axis: 'specY', chart: 'spec', pos: 'min' },
      { x: M.L - 48, y: syMaxY - 7, w: 42, h: 14, value: dispYMax, axis: 'specY', chart: 'spec', pos: 'max' }
    );
    for (let yl = Math.ceil(dispYMin / yStep) * yStep; yl <= dispYMax; yl += yStep) {
      const ly = toY(yl);
      const label = Math.abs(yl) < 0.001 ? '0' : Math.abs(yl) >= 1000 ? (yl/1000).toFixed(1)+'k'
        : Math.abs(yl) >= 1 ? yl.toFixed(2) : yl.toFixed(4);
      ctx.fillText(label, M.L - 5, ly + 3);
    }

    updateCursorDisplay();
  }

  // ═══════════════════════════════════════════
  // Draw Timeline
  // ═══════════════════════════════════════════
  function drawTML() {
    const d = rc(tCv, tWr); if (!d) return;
    const { w, h, dpr } = d;
    const ctx = tCv.getContext('2d');
    ctx.setTransform(1, 0, 0, 1, 0, 0); ctx.scale(dpr, dpr);
    ctx.fillStyle = '#0d1117'; ctx.fillRect(0, 0, w, h);
    const M = { L: 40, R: w - 12, T: 3, B: h - 3 };
    const pw = M.R - M.L, ph = M.B - M.T;
    if (ph <= 0 || pw <= 0) return;

    const now = rbN / SR;
    let maxT = Math.max(now + 2, 5);
    for (const c of components) {
      if (isFinite(c.tEnd) && c.tEnd > maxT) maxT = c.tEnd + 2;
      if (c.tStart > maxT) maxT = c.tStart + 2;
    }
    const span = Math.ceil(maxT / 5) * 5 || 10;
    const toX = t => M.L + (t / span) * pw;

    ctx.fillStyle = '#1c2129'; ctx.fillRect(M.L, M.T + ph * 0.2, pw, ph * 0.6);
    const colors = ['#58a6ff', '#f0c040', '#3fb950', '#f85149', '#bc8cff', '#d29922'];
    for (let ci = 0; ci < components.length; ci++) {
      const c = components[ci];
      const x1 = toX(c.tStart), x2 = toX(Math.min(isFinite(c.tEnd) ? c.tEnd : span, span));
      const y = M.T + ph * 0.2 + (ci % 3) * (ph * 0.2), barH = ph * 0.18;
      ctx.fillStyle = colors[ci % colors.length] + '55';
      ctx.fillRect(x1, y, Math.max(x2 - x1, 2), barH);
      ctx.strokeStyle = colors[ci % colors.length]; ctx.lineWidth = 0.6;
      ctx.strokeRect(x1, y, Math.max(x2 - x1, 2), barH);
    }
    const pxN = toX(Math.min(now, span));
    ctx.strokeStyle = '#f85149'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(pxN, M.T); ctx.lineTo(pxN, M.B); ctx.stroke();
    ctx.fillStyle = '#f85149';
    ctx.beginPath(); ctx.moveTo(pxN, M.T); ctx.lineTo(pxN - 4, M.T - 3); ctx.lineTo(pxN + 4, M.T - 3); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#8b949e'; ctx.font = '8px -apple-system, sans-serif'; ctx.textAlign = 'center';
    const tls = span > 60 ? 10 : span > 30 ? 5 : span > 10 ? 2 : 1;
    for (let tl = 0; tl <= span; tl += tls) ctx.fillText(tl + 's', toX(tl), M.B + 8);

    document.getElementById('tmlInfo').textContent = '总时长 ' + now.toFixed(1) + 's';
  }

  // ═══════════════════════════════════════════
  // Cursor display (in chart headers)
  // ═══════════════════════════════════════════
  function updateCursorDisplay() {
    const od = document.getElementById('oscCrDisplay');
    const sd = document.getElementById('specCrDisplay');

    if (cursorsOsc.length === 0) { od.innerHTML = ''; }
    else {
      od.innerHTML = cursorsOsc.map((cr, i) => {
        const isActive = activeCursor && activeCursor.type === 'osc' && activeCursor.idx === i;
        const c = cr.color || CURSOR_COLORS[i % CURSOR_COLORS.length];
        const parts = [];
        SOLO_OPTIONS.forEach(opt => {
          if (soloSelection[opt.id]) {
            if (opt.id === 'linearity') {
              const err = factorDeviation('linearity', 0);
              const clean = genSample(cr.t);
              parts.push(opt.label + ':±' + err.toFixed(3) + ' [' + (clean - err).toFixed(3) + '~' + (clean + err).toFixed(3) + ']');
            } else {
              parts.push(opt.label + ':' + soloSignal(opt.id, cr.t).toFixed(3));
            }
          }
        });
        if (showStacked) parts.push('叠加:' + stackedSignal(cr.t).toFixed(3));
        return '<span class="cr-line' + (isActive ? ' active' : '') + '" data-type="osc" data-idx="' + i + '">'
          + '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + c + ';margin-right:3px;vertical-align:middle;"></span>'
          + '光标' + (i + 1) + ': ' + cr.t.toFixed(4) + 's, ' + parts.join(' ') + 'N</span>';
      }).join('');
    }

    if (cursorsSpec.length === 0) { sd.innerHTML = ''; }
    else {
      sd.innerHTML = cursorsSpec.map((cr, i) => {
        const isActive = activeCursor && activeCursor.type === 'spec' && activeCursor.idx === i;
        const parts = [];
        SOLO_OPTIONS.forEach(opt => {
          if (soloSelection[opt.id]) {
            const sp = soloSpecs[opt.id];
            if (sp && sp.fs.length > 1) {
              const bi = Math.round(cr.freq / sp.fs[1]);
              parts.push(opt.label + ':' + ((bi>=0 && bi<sp.ms.length) ? sp.ms[bi].toFixed(3) : '0'));
            }
          }
        });
        if (showStacked && specFreqsStacked && specFreqsStacked.length > 1) {
          const bi = Math.round(cr.freq / specFreqsStacked[1]);
          parts.push('叠加:' + ((bi>=0 && bi<specMagsStacked.length) ? specMagsStacked[bi].toFixed(3) : '0'));
        }
        return '<span class="cr-line' + (isActive ? ' active' : '') + '" data-type="spec" data-idx="' + i + '">'
          + '光标' + (i + 1) + ': ' + cr.freq.toFixed(1) + 'Hz, ' + parts.join(' ') + '</span>';
      }).join('');
    }
  }

  // ═══════════════════════════════════════════
  // Add cursor
  // ═══════════════════════════════════════════
  function addOscCursor() {
    const { data, t0, t1 } = getOscData();
    if (data.vs.length < 2) return;
    const midT = (t0 + t1) / 2;
    const si = Math.round((midT - t0) / (t1 - t0) * (data.vs.length - 1));
    const snapT = data.ts[Math.max(0, Math.min(data.vs.length - 1, si))];
    const snapV = data.vs[Math.max(0, Math.min(data.vs.length - 1, si))];
    cursorsOsc.push({ id: nextCursorId++, t: snapT, v: snapV,
      color: CURSOR_COLORS[cursorsOsc.length % CURSOR_COLORS.length] });
    activeCursor = { type: 'osc', idx: cursorsOsc.length - 1 };
    redrawAll();
  }

  function addSpecCursor() {
    if (!specFreqs || specFreqs.length < 2) return;
    const effSR = specFreqs[1] * fftN;
    const midF = fftXMax / 2;
    const bi = Math.round(midF / effSR * fftN);
    const mag = (bi >= 0 && bi < specMags.length) ? specMags[bi] : 0;
    cursorsSpec.push({ id: nextCursorId++, freq: midF, mag });
    activeCursor = { type: 'spec', idx: cursorsSpec.length - 1 };
    redrawAll();
  }

  function redrawAll() {
    drawOsc(); drawSpec(); drawTML();
  }

  // Force immediate spectrum recompute (used when paused & options change)
  function forceSpecUpdate() {
    if (rbN < fftN) return;
    const sp = computeSpectrum();
    if (sp.fs.length > 0) { specFreqs = sp.fs; specMags = sp.ms; }
    soloSpecs = {};
    SOLO_OPTIONS.forEach(opt => {
      if (soloSelection[opt.id]) {
        if (opt.id === 'linearity') {
          const spOrig = computeSpectrumFor(t => genSample(t));
          if (spOrig.fs.length > 0) soloSpecs[opt.id] = spOrig;
        } else {
          const sp2 = computeSpectrumFor(t => soloSignal(opt.id, t));
          if (sp2.fs.length > 0) soloSpecs[opt.id] = sp2;
        }
      }
    });
    const first = SOLO_OPTIONS.find(opt => soloSelection[opt.id] && soloSpecs[opt.id]);
    if (first) { specFreqs = soloSpecs[first.id].fs; specMags = soloSpecs[first.id].ms; }
    else { specFreqs = null; specMags = null; }
    if (showStacked) {
      const spStacked = computeStackedSpectrum();
      if (spStacked.fs.length > 0) { specFreqsStacked = spStacked.fs; specMagsStacked = spStacked.ms; }
    } else {
      specFreqsStacked = null; specMagsStacked = null;
    }
  }

  // Canvas mouse events
  // ═══════════════════════════════════════════
  let dragCursor = null;

  function canvasPos(e, cv) {
    const rect = cv.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    const scaleX = rect.width / (cv.width / dpr);
    const scaleY = rect.height / (cv.height / dpr);
    return {
      mx: (e.clientX - rect.left) / scaleX,
      my: (e.clientY - rect.top) / scaleY

  }

  function nearestCursor(type, mx, my) {
    const M_LEFT = 52, M_RIGHT_OFF = 14, M_TOP = 8, M_BOTTOM_OFF = type === 'osc' ? 24 : 26;
    const cv = type === 'osc' ? oCv : sCv;
    const dpr = window.devicePixelRatio || 1;
    const w = cv.width / dpr, h = cv.height / dpr;
    const M = { L: M_LEFT, R: w - M_RIGHT_OFF, T: M_TOP, B: h - M_BOTTOM_OFF };
    const pw = M.R - M.L, ph = M.B - M.T;
    if (mx < M.L || mx > M.R || my < M.T || my > M.B) return null;

    if (type === 'osc' && cursorsOsc.length > 0) {
      const { data, t0, t1 } = getOscData();
      if (data.vs.length < 2) return null;
      const tSpan = t1 - t0 || 0.001;
      let best = null, bestD = 14;
      for (let i = 0; i < cursorsOsc.length; i++) {
        const cx = M.L + ((cursorsOsc[i].t - t0) / tSpan) * pw;
        const dx = Math.abs(mx - cx);
        if (dx < bestD) { bestD = dx; best = { type: 'osc', idx: i }; }
      }
      return best;
    } else if (type === 'spec' && cursorsSpec.length > 0 && specFreqs && specFreqs.length > 1) {
      const fDispMax = Math.min(fftXMax, SR / 2);
      const fRange = fDispMax - fftXMin || 1;
      let best = null, bestD = 14;
      for (let i = 0; i < cursorsSpec.length; i++) {
        const cx = M.L + ((cursorsSpec[i].freq - fftXMin) / fRange) * pw;
        const dx = Math.abs(mx - cx);
        if (dx < bestD) { bestD = dx; best = { type: 'spec', idx: i }; }
      }
      return best;
    }
    return null;
  }

              } else {
                for (let i = 0; i < data.vs.length; i += st3) {
                  const v = stackedSignal(ts3[i]); if (v < yMin) yMin = v; if (v > yMax) yMax = v;
                }
              }
            }
            if (!isFinite(yMin)) { yMin = -1; yMax = 1; }
            const yr = yMax - yMin || 1; yMin -= yr * 0.15; yMax += yr * 0.15;
          } else { yMin = oscYMin; yMax = oscYMax; }
          const yRange = yMax - yMin || 1;

          const x0 = Math.max(M.L, Math.min(M.R, Math.min(zoomDrag.x0, zoomDrag.mx)));
          const x1 = Math.max(M.L, Math.min(M.R, Math.max(zoomDrag.x0, zoomDrag.mx)));
          const y0 = Math.min(M.B, Math.max(M.T, Math.max(zoomDrag.y0, zoomDrag.my)));
          const y1 = Math.min(M.B, Math.max(M.T, Math.min(zoomDrag.y0, zoomDrag.my)));

          const minPx = 10;
          if (Math.abs(x1 - x0) > minPx && Math.abs(y1 - y0) > minPx) {
            const newT0 = t0 + ((x0 - M.L) / pw) * tSpan;
            const newT1 = t0 + ((x1 - M.L) / pw) * tSpan;
            const newY0 = yMax - ((y0 - M.T) / ph) * yRange;
            const newY1 = yMax - ((y1 - M.T) / ph) * yRange;

            oscTimeMode = 'fixed';
            document.querySelectorAll('#timeModeRow button').forEach(b => b.classList.remove('active'));
            const fb = document.querySelector('#timeModeRow button[data-mode="fixed"]');
            if (fb) fb.classList.add('active');
            document.getElementById('slidingSpanRow').style.display = 'none';
            document.getElementById('fixedRangeRow').style.display = '';

            oscFXMin = newT0; oscFXMax = newT1;
            oscYAuto = false; oscYMin = newY0; oscYMax = newY1;
            document.getElementById('oscXMin').value = oscFXMin.toFixed(4);
            document.getElementById('oscXMax').value = oscFXMax.toFixed(4);
            document.getElementById('oscYAuto').checked = false;
            document.getElementById('oscYMin').disabled = false;
            document.getElementById('oscYMax').disabled = false;
            document.getElementById('oscYMin').value = oscYMin.toFixed(4);
            document.getElementById('oscYMax').value = oscYMax.toFixed(4);
          }
        }
      }
      zoomDrag = null;
      redrawAll();
      return;
    }
    if (panStart) {
      panStart = null;
      oCv.style.cursor = oscTool === 'pan' ? 'grab' : 'crosshair';
      return;
    }
    dragCursor = null;
  });

  window.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); btnRun.click(); return; }
    if (e.code === 'Escape') {
      if (zoomDrag || panStart || oscTool !== 'none') {
        e.preventDefault();
        zoomDrag = null; panStart = null;
        oscTool = 'none';
        oCv.style.cursor = 'crosshair';
        document.querySelectorAll('#oscTools .btn-tool').forEach(b => b.classList.remove('active'));
        document.querySelector('#oscTools [data-tool="none"]').classList.add('active');
        redrawAll();
        return;
      }
    }
    if (e.code === 'Delete' || e.code === 'Backspace') {
      if (!activeCursor) return;
      e.preventDefault();
      if (activeCursor.type === 'osc') { cursorsOsc.splice(activeCursor.idx, 1); }
      else { cursorsSpec.splice(activeCursor.idx, 1); }
      activeCursor = null;
      redrawAll(); return;
    }
    if (e.code === 'Tab') {
      e.preventDefault();
      const all = [...cursorsOsc.map((_, i) => ({ type: 'osc', idx: i })),
                   ...cursorsSpec.map((_, i) => ({ type: 'spec', idx: i }))];
      if (all.length === 0) return;
      if (!activeCursor) { activeCursor = all[0]; }
      else {
        const curIdx = all.findIndex(a => a.type === activeCursor.type && a.idx === activeCursor.idx);
        activeCursor = all[(curIdx + 1) % all.length];
      }
      redrawAll(); return;
    }
    if (!activeCursor) return;
    if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
      e.preventDefault();
      const step = e.code === 'ArrowRight' ? 1 : -1;
      if (activeCursor.type === 'osc') {
        const cr = cursorsOsc[activeCursor.idx];
        const { t0, t1 } = getOscData();
        cr.t += step * (t1 - t0) / 500;
      } else {
        const cr = cursorsSpec[activeCursor.idx];
        cr.freq += step * fftXMax / 500;
        cr.freq = Math.max(0.5, Math.min(fftXMax, cr.freq));
      }
      redrawAll();
    }
  });

  // ═══════════════════════════════════════════
  // Animation
  // ═══════════════════════════════════════════
  let raf;
  function anim(ts) {
    if (!running) { raf = requestAnimationFrame(anim); return; }
    const dt = Math.min((ts - lastT) / 1000, 0.1);
    lastT = ts;

    let t0;
    if (rbN === 0) t0 = 0;
    else { const li = (rbW - 1 + RB_SIZE) % RB_SIZE; t0 = rbT[li] + 1 / SR; }
    genSamples(t0, t0 + dt);

    drawOsc();
    specCtr++;
    if (specCtr >= specIntv && rbN >= fftN) {
      specCtr = 0;
      const sp = computeSpectrum();
      if (sp.fs.length > 0) { specFreqs = sp.fs; specMags = sp.ms; }
      // Solo spectra (one per checked item)
      soloSpecs = {};
      SOLO_OPTIONS.forEach(opt => {
        if (soloSelection[opt.id]) {
          if (opt.id === 'linearity') {
            // Linearity: constant error band, FFT of constant is just DC — reuse original's spectrum
            const spOrig = computeSpectrumFor(t => genSample(t));
            if (spOrig.fs.length > 0) soloSpecs[opt.id] = spOrig;
          } else {
            const sp = computeSpectrumFor(t => soloSignal(opt.id, t));
            if (sp.fs.length > 0) soloSpecs[opt.id] = sp;
          }
        }
      });
      // Set specFreqs/specMags baseline from first checked solo item
      const first = SOLO_OPTIONS.find(opt => soloSelection[opt.id] && soloSpecs[opt.id]);
      if (first) { specFreqs = soloSpecs[first.id].fs; specMags = soloSpecs[first.id].ms; }
      else { specFreqs = null; specMags = null; }
      // Stacked spectrum (if enabled)
      if (showStacked) {
        const spStacked = computeStackedSpectrum();
        if (spStacked.fs.length > 0) { specFreqsStacked = spStacked.fs; specMagsStacked = spStacked.ms; }
      } else {
        specFreqsStacked = null; specMagsStacked = null;
      }
    }
    drawSpec();
    drawTML();

    fc++;
    if (ts - fpsT >= 1000) { curFPS = Math.round(fc / ((ts - fpsT) / 1000)); fc = 0; fpsT = ts; }
    document.getElementById('fpsLabel').textContent = curFPS;
    document.getElementById('timeLabel').textContent = (rbN / SR).toFixed(1);
    raf = requestAnimationFrame(anim);
  }

  clEl.addEventListener('change', e => {

    const v = parseFloat(e.target.value);

  // ═══════════════════════════════════════════
  // Oscilloscope tool buttons (Zoom / Reset / Pan)
  // ═══════════════════════════════════════════
  document.getElementById('oscTools').addEventListener('click', e => {
    const btn = e.target.closest('.btn-tool'); if (!btn) return;
    const tool = btn.dataset.tool;

    if (tool === 'zoomIn' || tool === 'zoomOut') {
      const factor = tool === 'zoomIn' ? 0.8 : 1.25;
      const { data, t0, t1 } = getOscData();
      if (data.vs.length < 2) return;

      let yMin, yMax;
      if (oscYAuto) {
        yMin = Infinity; yMax = -Infinity;
        for (let i = 0; i < data.vs.length; i++) { if (data.vs[i] < yMin) yMin = data.vs[i]; if (data.vs[i] > yMax) yMax = data.vs[i]; }
        if (!isFinite(yMin)) { yMin = -1; yMax = 1; }
        const yr = yMax - yMin || 1; yMin -= yr * 0.15; yMax += yr * 0.15;
      } else { yMin = oscYMin; yMax = oscYMax; }

      const cx = (t0 + t1) / 2, cy = (yMin + yMax) / 2;
      const tSpan = (t1 - t0 || 0.001) * factor;
      const yRange = (yMax - yMin || 1) * factor;

      if (oscTimeMode !== 'fixed') {
        oscTimeMode = 'fixed';
        document.querySelectorAll('#timeModeRow button').forEach(b => b.classList.remove('active'));
        const fb = document.querySelector('#timeModeRow button[data-mode="fixed"]');
        if (fb) fb.classList.add('active');
        document.getElementById('slidingSpanRow').style.display = 'none';
        document.getElementById('fixedRangeRow').style.display = '';
      }
      oscYAuto = false;
      document.getElementById('oscYAuto').checked = false;
      document.getElementById('oscYMin').disabled = false;
      document.getElementById('oscYMax').disabled = false;

      oscFXMin = cx - tSpan / 2; oscFXMax = cx + tSpan / 2;
      oscYMin = cy - yRange / 2; oscYMax = cy + yRange / 2;
      document.getElementById('oscXMin').value = oscFXMin.toFixed(4);
      document.getElementById('oscXMax').value = oscFXMax.toFixed(4);
      document.getElementById('oscYMin').value = oscYMin.toFixed(4);
      document.getElementById('oscYMax').value = oscYMax.toFixed(4);
      redrawAll();
      return;
    }

    if (tool === 'reset') {
      oscTimeMode = 'sliding';
      document.querySelectorAll('#timeModeRow button').forEach(b => b.classList.remove('active'));
      const sb = document.querySelector('#timeModeRow button[data-mode="sliding"]');
      if (sb) sb.classList.add('active');
      document.getElementById('slidingSpanRow').style.display = '';
      document.getElementById('fixedRangeRow').style.display = 'none';

      oscYAuto = true;
      document.getElementById('oscYAuto').checked = true;
      document.getElementById('oscYMin').disabled = true;
      document.getElementById('oscYMax').disabled = true;

      oscTool = 'none';
      oCv.style.cursor = 'crosshair';
      redrawAll();
      document.querySelectorAll('#oscTools .btn-tool').forEach(b => b.classList.remove('active'));
      document.querySelector('#oscTools [data-tool="none"]').classList.add('active');
      return;
    }

    if (oscTool === tool) {
      oscTool = 'none';
      oCv.style.cursor = 'crosshair';
      zoomDrag = null; panStart = null;
      btn.classList.remove('active');
      document.querySelector('#oscTools [data-tool="none"]').classList.add('active');
      redrawAll();
      return;
    }

    oscTool = tool;
    zoomDrag = null; panStart = null;
    document.querySelectorAll('#oscTools .btn-tool').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    if (tool === 'pan') {
      oCv.style.cursor = 'grab';

  function loadAllFactorConfigs() {

      try {
        const raw = localStorage.getItem(def.storageKey);
        if (raw) {
          const cfg = JSON.parse(raw);
          const merged = { ...def.defaultParams, ...cfg };
          Object.keys(merged).forEach(k => {
            if (k in def.defaultParams) factorParams[def.id][k] = merged[k];
          });
          factorConfigured[def.id] = true;

      } catch (e) { /* ignore */ }

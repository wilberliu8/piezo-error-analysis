<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Arial, sans-serif">
  
  <!-- 标题 -->
  <text x="400" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">电荷放大器等效电路</text>
  
  <!-- === 传感器部分 === -->
  <!-- 虚线框 -->
  <rect x="30" y="80" width="200" height="280" rx="8" fill="#E8F4FD" stroke="#4A90D9" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="130" y="105" text-anchor="middle" font-size="14" fill="#4A90D9" font-weight="bold">传感器</text>
  
  <!-- 电荷源 Q -->
  <circle cx="130" cy="180" r="30" fill="#FFF" stroke="#4A90D9" stroke-width="2"/>
  <text x="130" y="178" text-anchor="middle" font-size="11" fill="#4A90D9">Q</text>
  <text x="130" y="193" text-anchor="middle" font-size="10" fill="#666">(d×F)</text>
  
  <!-- 传感器电容 Cp -->
  <g transform="translate(130, 260)">
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#4A90D9" stroke-width="2"/>
    <line x1="-12" y1="-8" x2="-12" y2="8" stroke="#4A90D9" stroke-width="2"/>
    <line x1="12" y1="-8" x2="12" y2="8" stroke="#4A90D9" stroke-width="2"/>
    <text x="0" y="22" text-anchor="middle" font-size="11" fill="#666">Cₚ</text>
  </g>
  
  <!-- 传感器漏电阻 Rp -->
  <rect x="105" y="310" width="50" height="20" rx="3" fill="#FFF" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="130" y="323" text-anchor="middle" font-size="10" fill="#666">Rₚ</text>
  
  <!-- 传感器到放大器的连接线 -->
  <line x1="230" y1="200" x2="280" y2="200" stroke="#333" stroke-width="2"/>
  <line x1="230" y1="340" x2="280" y2="340" stroke="#333" stroke-width="1.5"/>
  
  <!-- 电缆电容 Cc -->
  <g transform="translate(255, 270)">
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#FF8C00" stroke-width="2"/>
    <line x1="-6" y1="-6" x2="-6" y2="6" stroke="#FF8C00" stroke-width="2"/>
    <line x1="6" y1="-6" x2="6" y2="6" stroke="#FF8C00" stroke-width="2"/>
  </g>
  <text x="258" y="295" text-anchor="middle" font-size="10" fill="#FF8C00">C</text>
  <text x="264" y="295" text-anchor="start" font-size="10" fill="#FF8C00">c</text>
  
  <!-- === 运放部分 === -->
  <rect x="280" y="80" width="200" height="280" rx="8" fill="#FFF8E1" stroke="#F5A623" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="380" y="105" text-anchor="middle" font-size="14" fill="#F5A623" font-weight="bold">电荷放大器（运放）</text>
  
  <!-- 运放三角 -->
  <polygon points="350,150 350,270 430,210" fill="#FFF" stroke="#D0021B" stroke-width="2"/>
  <text x="370" y="218" text-anchor="middle" font-size="14" fill="#D0021B" font-weight="bold">-</text>
  <text x="415" y="218" text-anchor="middle" font-size="11" fill="#D0021B" font-weight="bold">A</text>
  
  <!-- 运放接地 -->
  <line x1="380" y1="315" x2="380" y2="360" stroke="#333" stroke-width="1.5"/>
  <line x1="360" y1="360" x2="400" y2="360" stroke="#333" stroke-width="2"/>
  <line x1="365" y1="366" x2="395" y2="366" stroke="#333" stroke-width="2"/>
  <line x1="370" y1="372" x2="390" y2="372" stroke="#333" stroke-width="2"/>
  <text x="355" y="388" text-anchor="middle" font-size="11" fill="#999">GND</text>
  
  <!-- === 反馈回路 === -->
  <!-- 反馈电阻 Rf -->
  <rect x="476" y="145" width="50" height="22" rx="3" fill="#FFF" stroke="#D0021B" stroke-width="1.5"/>
  <text x="501" y="159" text-anchor="middle" font-size="11" fill="#D0021B">R</text>
  <text x="511" y="159" text-anchor="start" font-size="11" fill="#D0021B">f</text>
  
  <!-- 反馈电容 Cf -->
  <g transform="translate(501, 200)">
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#D0021B" stroke-width="2"/>
    <line x1="-8" y1="-7" x2="-8" y2="7" stroke="#D0021B" stroke-width="2"/>
    <line x1="8" y1="-7" x2="8" y2="7" stroke="#D0021B" stroke-width="2"/>
  </g>
  <text x="501" y="225" text-anchor="middle" font-size="11" fill="#D0021B">C</text>
  <text x="511" y="225" text-anchor="start" font-size="11" fill="#D0021B">f</text>
  
  <!-- 从输出到反馈的连线 -->
  <line x1="430" y1="210" x2="470" y2="210" stroke="#D0021B" stroke-width="1.5"/>
  <line x1="526" y1="156" x2="560" y2="156" stroke="#D0021B" stroke-width="1.5"/>
  <line x1="560" y1="156" x2="560" y2="210" stroke="#D0021B" stroke-width="1.5"/>
  <line x1="560" y1="210" x2="526" y2="210" stroke="#D0021B" stroke-width="1.5"/>
  
  <!-- 输入连线到反馈 -->
  <line x1="350" y1="210" x2="325" y2="210" stroke="#D0021B" stroke-width="1.5"/>
  <line x1="325" y1="210" x2="325" y2="172" stroke="#D0021B" stroke-width="1.5"/>
  <line x1="325" y1="172" x2="476" y2="172" stroke="#D0021B" stroke-width="1.5" stroke-dasharray="5,3"/>
  
  <!-- 标签说明 -->
  <text x="540" y="140" text-anchor="middle" font-size="10" fill="#666">反馈回路</text>
  
  <!-- === 输出 === -->
  <line x1="480" y1="210" x2="700" y2="210" stroke="#333" stroke-width="2.5"/>
  <polygon points="700,200 720,210 700,220" fill="#333" stroke="#333" stroke-width="1"/>
  <text x="650" y="235" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Vout</text>
  <text x="650" y="250" text-anchor="middle" font-size="11" fill="#666">= -Q总 / Cf</text>
  
  <!-- === 偏置电流示意 === -->
  <!-- 用红色箭头标注 Ib -->
  <line x1="340" y1="270" x2="340" y2="290" stroke="#D0021B" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="325" y="268" text-anchor="end" font-size="12" fill="#D0021B" font-weight="bold">I</text>
  <text x="332" y="268" text-anchor="start" font-size="12" fill="#D0021B" font-weight="bold">b</text>
  <text x="310" y="305" text-anchor="end" font-size="10" fill="#D0021B">（偏置电流）</text>
  
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#D0021B"/>
    </marker>
  </defs>
  
  <!-- === 图例 === -->
  <rect x="30" y="410" width="740" height="70" rx="6" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="50" y="435" font-size="12" font-weight="bold" fill="#333">图例：</text>
  
  <rect x="120" y="423" width="14" height="10" rx="2" fill="#4A90D9"/>
  <text x="140" y="433" font-size="11" fill="#555">传感器部分（Q传感器 + Cₚ + Rₚ）</text>
  
  <rect x="420" y="423" width="14" height="10" rx="2" fill="#FF8C00"/>
  <text x="440" y="433" font-size="11" fill="#555">电缆电容 Cc</text>
  
  <rect x="120" y="445" width="14" height="10" rx="2" fill="#FFF8E1" stroke="#F5A623" stroke-width="1"/>
  <text x="140" y="455" font-size="11" fill="#555">运放部分（含Rf、Cf反馈回路）</text>
  
  <rect x="420" y="445" width="14" height="10" rx="2" fill="#FFF" stroke="#D0021B" stroke-width="1.5"/>
  <text x="440" y="455" font-size="11" fill="555">反馈回路元件 Rf、Cf</text>
  
</svg>